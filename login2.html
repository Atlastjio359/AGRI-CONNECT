





<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration & Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

    <style>
    body {
    font-family: 'Roboto', sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 0;
    background-image:url('image/img.avif');
    background-size:cover;
    
}
.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: 40px auto;
    
}
.form-container {
    width: 300px;
    margin: 20px;
    padding: 30px;
    border: 2px solid #ddd;
    border-radius: 10px;
    background-color: #fff;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s;
    background-image:url('image/img.avif');
    background-size:cover;

}
.form-container:hover {
    transform: scale(1.03);
}
.form-container h2 {
    text-align: center;
    color: #333;
}
.form-container label {
    color: #555;
    font-weight: bold;
    margin-bottom: 5px;
    display: block;
}
.form-container input[type="text"], .form-container input[type="password"] {
    width: 100%;
    height: 40px;
    margin-bottom: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
    transition: border-color 0.3s;
}
.form-container input[type="text"]:focus, .form-container input[type="password"]:focus {
    border-color: #4CAF50;
    outline: none;
}
.form-container input[type="submit"], .form-container button {
    width: 100%;
    height: 45px;
    background-color: #4CAF50;
    color: #fff;
    font-size: 18px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
}
.form-container input[type="submit"]:hover, .form-container button:hover {
    background-color: #45a049;
}

.form-container buttons button{
margin:0 10px;
}


    </style>
</head>
<body>
<div class="container">
    <!-- Initial Buttons -->
    <div class="form-container" id="initial-buttons">
        <h2>Welcome</h2>
        <button onclick="showRegistration()">Register</button>
        <button onclick="showLogin()">Login</button>
    </div>

    <!-- Registration Options -->
    <div class="form-container" id="registration-buttons" style="display:none;">
        <h2>Register as</h2>
        <button onclick="showFarmerRegistration()">Farmer</button>
        <button onclick="showShopkeeperRegistration()">Shopkeeper</button>
        <button onclick="backToMain()">Back</button>
    </div>

    <!-- Login Options -->
    <div class="form-container" id="login-buttons" style="display:none;">
        <h2>Login as</h2>
        <button onclick="showFarmerLogin()">Farmer</button>
        <button onclick="showShopkeeperLogin()">Shopkeeper</button>
        <button onclick="backToMain()">Back</button>
    </div>

    <!-- Farmer Registration Form -->
    <div class="form-container" id="farmer-registration" style="display:none;">
        <h2>Farmer Registration</h2>
        <form action="index.html" method="post">
            <label for="newFarmerUsername">New Username:</label>
            <input type="text" id="newFarmerUsername" name="newFarmerUsername" required>
            <label for="newFarmerPassword">New Password:</label>
            <input type="password" id="newFarmerPassword" name="newFarmerPassword" required>
            <input type="submit" value="Register" name="register_farmer">
        </form>
        <button onclick="backToRegistration()">Back</button>
    </div>

    <!-- Shopkeeper Registration Form -->
    <div class="form-container" id="shopkeeper-registration" style="display:none;">
        <h2>Shopkeeper Registration</h2>
        <form action="shopp.html" method="post">
            <label for="newShopkeeperUsername">New Username:</label>
            <input type="text" id="newShopkeeperUsername" name="newShopkeeperUsername" required>
            <label for="newShopkeeperPassword">New Password:</label>
            <input type="password" id="newShopkeeperPassword" name="newShopkeeperPassword" required>
            <input type="submit" value="Register" name="register_shopkeeper">
        </form>
        <button onclick="backToRegistration()">Back</button>
    </div>

    <!-- Farmer Login Form -->
    <div class="form-container" id="farmer-login" style="display:none;">
        <h2>Farmer Login</h2>
        <form action="index.html" method="get">
            <label for="farmerUsername">Username:</label>
            <input type="text" id="farmerUsername" name="farmerUsername" required>
            <label for="farmerPassword">Password:</label>
            <input type="password" id="farmerPassword" name="farmerPassword" required>
            <input type="submit" value="Login" name="f1">
        </form>
        <button onclick="backToLogin()">Back</button>
    </div>

    <!-- Shopkeeper Login Form -->
    <div class="form-container" id="shopkeeper-login" style="display:none;">
        <h2>Shopkeeper Login</h2>
        <form action="shopp.html" method="get">
            <label for="shopkeeperUsername">Username:</label>
            <input type="text" id="shopkeeperUsername" name="shopkeeperUsername" required>
            <label for="shopkeeperPassword">Password:</label>
            <input type="password" id="shopkeeperPassword" name="shopkeeperPassword" required>
            <input type="submit" value="Login" name="s1">
        </form>
        <button onclick="backToLogin()">Back</button>
    </div>
</div>

<script>
    function showRegistration() {
        document.getElementById('initial-buttons').style.display = 'none';
        document.getElementById('registration-buttons').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('initial-buttons').style.display = 'none';
        document.getElementById('login-buttons').style.display = 'block';
    }

    function showFarmerRegistration() {
        document.getElementById('registration-buttons').style.display = 'none';
        document.getElementById('farmer-registration').style.display = 'block';
    }

    function showShopkeeperRegistration() {
        document.getElementById('registration-buttons').style.display = 'none';
        document.getElementById('shopkeeper-registration').style.display = 'block';
        document.getElementById('shopkeeper-registration-form').addEventListener('submit', function() {
        window.location = 'shopp.html';
    });
    }
    

    function showFarmerLogin() {
        document.getElementById('login-buttons').style.display = 'none';
        document.getElementById('farmer-login').style.display = 'block';
    }

    function showShopkeeperLogin() {
        document.getElementById('login-buttons').style.display = 'none';
        document.getElementById('shopkeeper-login').style.display = 'block';
        document.getElementById('shopkeeper-login-form').addEventListener('submit', function() {
        window.location = 'shopp.html';
        });  
    }

    function backToMain() {
        document.getElementById('registration-buttons').style.display = 'none';
        document.getElementById('login-buttons').style.display = 'none';
        document.getElementById('initial-buttons').style.display = 'block';
    }

    function backToRegistration() {
        document.getElementById('farmer-registration').style.display = 'none';
        document.getElementById('shopkeeper-registration').style.display = 'none';
        document.getElementById('registration-buttons').style.display = 'block';
    }

    function backToLogin() {
        document.getElementById('farmer-login').style.display = 'none';
        document.getElementById('shopkeeper-login').style.display = 'none';
        document.getElementById('login-buttons').style.display = 'block';
    }
</script>
</body>
</html>
