<h2>Add Product</h2>
<div class="row">
<div class="col-md-4">
</div>
<div class="col-md-4">
<div class="panel panel-default" style=background-image:url("image/T2.jpeg")>
  <div class="panel-body">
        <form id="productForm">
            <input type="text" id="name" name="name" placeholder="Product Name" required class="form-control"><br>
            <textarea id="description" name="description"  placeholder="Description" required class="form-control"></textarea><br>
            <select required class="form-control">
                <option>Crops</option>
                <option>Pesticides</option>
                <option>Fertilizers</option>
                <option>Organic-product</option>
                </select><br>
            <input type="number" id="price" name="price"  placeholder="Price" required class="form-control"><br>
            <input type="number" id="quantity" name="quantity" placeholder="Quantity" required class="form-control"><br>
            <label for="image">Image:</label>
            <input type="file" id="image" name="image" placeholder="Image" required class="form-control"><br>
             &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp<button type="submit" class="btn btn-success">Add Product</button>
        </form>
</div>
</div> 
</div>

</div>
