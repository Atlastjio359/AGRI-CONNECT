<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopkeeper Site</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

  <link rel="stylesheet" href="products.css">
  <style>
    /* Global Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: Arial, sans-serif;
      background-image: url('image/formbgimg.jpg');

      background-size: cover;
      background-position: center;
    }
    
    /* Section Styles */
    section {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image: url('image/bg.png');
      background-size: cover;
      background-position: center;
    }
    
    /* Header Styles */
    header {
      background-color: #85b506;
      color: #fff;
      padding: 1em;
      text-align: center;
      width: 100%;
    }
    
    nav ul {
      list-style: none;
      display: flex;
      justify-content: space-between;
    }
    
    nav li {
      margin-right: 20px;
    }
    
    nav a {
      color: #fff;
      text-decoration: none;
    }
    
    /* Main Content Styles */
    .main {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-around;
      width: 80%;
      margin-top: 50px;
    }
    
    .main_tag {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 150px;
               }
    
    .main_tag h1 {
      font-size: 55px;
      margin-bottom: 20px;
    }
    
    .main_tag span {
      color: #85b506;
    }
    
    .main_tag p {
      width: 650px;
      text-align: justify;
      line-height: 22px;
      margin-bottom: 20px;
      font-size: 18px;
    }
    
    .main_btn {
      background: #089da1;
      padding: 10px 20px;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }
    
    .main_img img {
      width: 580px;
      border-radius: 50px;
      boarder-margin: 10px;
    }
  </style>
</head>
<body>
  <section>
    <header>
      <nav>
        <ul>
          <li><a href="shopp.html">Home</a></li>
          <li><a href="products2.html">Products</a></li>
                    <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
    </header>
    <div class="main">
      <div class="main_tag">
        <h1 "font-size=10%">WELCOME TO<br><span>AGRICONNECT</span></h1>
        <p>Reach a vast network of farmers and agricultural experts. Showcase your fertilizers and expertise. Increase sales and customer loyalty. Stay updated on market trends.</p>
              </div>
      <div class="main_img">
        <img src="image/fertilizersymbol.png">
      </div>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
